<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像のデジタル標本化ツール</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f5f7ff 0%, #eef2ff 100%);
      color: #1f2937;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .header p {
      margin: 0.75rem auto 0;
      max-width: 780px;
      color: #4b5563;
      line-height: 1.6;
    }

    .grid { display: grid; gap: 20px; }

    .controls, .results, .preview {
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.06);
    }

    .controls { display: grid; gap: 16px; }

    .controls label, .results label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .controls input[type="file"],
    .controls input[type="range"],
    .controls button,
    .controls select {
      width: 100%;
      font: inherit;
    }

    /* ── Color mode cards ── */
    .section-label {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 10px;
      display: block;
    }

    .color-mode-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .mode-card {
      border: 2px solid #d1d5db;
      border-radius: 14px;
      padding: 14px 10px;
      cursor: pointer;
      transition: border-color 200ms, background 200ms, transform 150ms;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      text-align: center;
      background: white;
      user-select: none;
    }

    .mode-card:hover {
      border-color: #818cf8;
      background: #f5f3ff;
      transform: translateY(-1px);
    }

    .mode-card.active {
      border-color: #4338ca;
      background: #eef2ff;
    }

    .mode-card input[type="radio"] { display: none; }

    .mode-name {
      font-weight: 700;
      font-size: 1rem;
      color: #1f2937;
    }

    .mode-formula {
      font-size: 0.9rem;
      color: #4338ca;
      font-weight: 600;
      line-height: 1.4;
    }

    .mode-formula sup {
      font-size: 0.7em;
    }

    .mode-range {
      font-size: 0.78rem;
      color: #6b7280;
      margin-top: 2px;
    }

    /* ── Range row ── */
    .range-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .range-row output {
      font-weight: 700;
      min-width: 2.75rem;
      text-align: right;
    }

    button {
      border: none;
      background: #4338ca;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease;
    }

    button:hover {
      background: #3730a3;
      transform: translateY(-1px);
    }

    .preview { display: grid; gap: 16px; }

    .image-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .image-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      overflow: hidden;
      background: #fafbff;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-card img, .image-card canvas {
      width: 100%;
      height: auto;
      max-height: 360px;
      object-fit: contain;
    }

    .color-panel {
      display: grid;
      gap: 14px;
      align-content: start;
      padding: 14px;
    }

    .bit-control { display: grid; gap: 10px; }

    .bit-control-disabled {
      opacity: 0.45;
      pointer-events: none;
    }

    .color-stats .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .color-palette {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      max-width: 100%;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
      font-size: 0.72rem;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    }

    .specimen-grid {
      display: grid;
      gap: 2px;
      border-radius: 12px;
      overflow: hidden;
      background: #e5e7eb;
      min-height: 220px;
      width: 100%;
      aspect-ratio: 1;
    }

    .specimen-grid div { aspect-ratio: 1; }

    .metadata { display: grid; gap: 12px; }

    .metadata .data-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .metadata .data-row:last-child { border-bottom: none; }
    .metadata strong { color: #111827; }

    .results pre {
      margin: 0;
      padding: 14px;
      background: #f8fafc;
      border-radius: 14px;
      overflow-x: auto;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .note {
      color: #4b5563;
      font-size: 0.95rem;
    }

    /* ── Data calculation ── */
    .calc-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px 20px;
      display: grid;
      gap: 18px;
    }

    .calc-section { display: grid; gap: 8px; }

    .calc-section + .calc-section {
      padding-top: 18px;
      border-top: 1px dashed #d1d5db;
    }

    .calc-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: #374151;
    }

    .calc-formula-line {
      font-size: 0.88rem;
      color: #6b7280;
      font-family: 'Courier New', monospace;
    }

    .calc-numbers {
      font-size: 0.97rem;
      color: #1f2937;
      font-family: 'Courier New', monospace;
      background: white;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      line-height: 1.7;
    }

    .calc-numbers strong {
      color: #4338ca;
      font-size: 1.08rem;
    }

    .calc-note {
      font-size: 0.82rem;
      color: #9ca3af;
    }

    .calc-placeholder {
      color: #9ca3af;
      font-size: 0.9rem;
      text-align: center;
      padding: 20px 0;
    }

    @media (max-width: 900px) {
      .image-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page { padding: 16px; }
      button { width: 100%; }
      .color-mode-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>画像のデジタル標本化ツール</h1>
      <p>撮影した写真をアップロードすると、自動で量子化した標本が表示されます。標本化の粒度は後からスライダーで調整できます。</p>
    </header>

    <div class="grid">
      <!-- ── Controls ── -->
      <section class="controls">
        <label for="imageUpload">写真をアップロード</label>
        <input type="file" id="imageUpload" accept="image/*" />

        <div>
          <span class="section-label">カラーモード</span>
          <div class="color-mode-group">

            <label class="mode-card" id="modeCard-binary">
              <input type="radio" name="colorMode" value="binary" />
              <span class="mode-name">2値画像</span>
              <span class="mode-formula">2<sup>1</sup> = 1 bit</span>
              <span class="mode-range">値：0 〜 1</span>
            </label>

            <label class="mode-card" id="modeCard-grayscale">
              <input type="radio" name="colorMode" value="grayscale" />
              <span class="mode-name">グレースケール</span>
              <span class="mode-formula">2<sup>8</sup> = 8 bit</span>
              <span class="mode-range">値：0 〜 255</span>
            </label>

            <label class="mode-card active" id="modeCard-fullcolor">
              <input type="radio" name="colorMode" value="fullcolor" checked />
              <span class="mode-name">フルカラー</span>
              <span class="mode-formula">2<sup>24</sup> = 24 bit</span>
              <span class="mode-range">値：0 〜 16,777,216</span>
            </label>

          </div>
        </div>

        <div class="range-row">
          <label for="quantizationSlider">標本化量子化数</label>
          <output id="quantizationValue">16</output>
        </div>
        <input type="range" id="quantizationSlider" min="4" max="48" value="16" step="1" />

        <button id="clearButton" type="button">リセット</button>
      </section>

      <!-- ── Preview ── -->
      <section class="preview">
        <div class="image-row">
          <div class="image-card" id="originalPreview">
            <p class="note">ここにアップロードした写真が表示されます。</p>
          </div>
          <div class="image-card color-panel">
            <div class="bit-control" id="bitDepthWrapper">
              <label for="bitDepthSelect" id="bitDepthLabel">量子化ビット数</label>
              <select id="bitDepthSelect"></select>
            </div>
            <div class="color-stats">
              <p class="note">標本化後の色数と使用色パレットを表示します。</p>
              <div class="stat-row"><strong>色数:</strong> <span id="colorsUsedText">0</span></div>
              <div id="colorPalette" class="color-palette"></div>
              <p class="note" id="colorNote"></p>
            </div>
          </div>
        </div>

        <div class="specimen-grid" id="specimenGrid">
          <p class="note">ここに標本化された結果が表示されます。</p>
        </div>
      </section>

      <!-- ── Results ── -->
      <section class="results">
        <h2>標本データ</h2>
        <div class="metadata" id="metadata"></div>

        <h3>データ量の計算</h3>
        <div id="dataCalc">
          <p class="calc-placeholder">画像をアップロードすると計算式が表示されます。</p>
        </div>

        <h3>JSON出力</h3>
        <button id="toggleJsonButton" type="button">JSON出力表示</button>
        <pre id="jsonOutput" style="display: none;">{}</pre>
      </section>
    </div>

    <canvas id="sourceCanvas" hidden></canvas>
  </main>

  <script>
    const uploadInput      = document.getElementById('imageUpload');
    const quantSlider      = document.getElementById('quantizationSlider');
    const quantOutput      = document.getElementById('quantizationValue');
    const specimenGrid     = document.getElementById('specimenGrid');
    const originalPreview  = document.getElementById('originalPreview');
    const sourceCanvas     = document.getElementById('sourceCanvas');
    const metadataEl       = document.getElementById('metadata');
    const colorsUsedText   = document.getElementById('colorsUsedText');
    const colorPalette     = document.getElementById('colorPalette');
    const colorNote        = document.getElementById('colorNote');
    const jsonOutput       = document.getElementById('jsonOutput');
    const toggleJsonButton = document.getElementById('toggleJsonButton');
    const bitDepthSelect   = document.getElementById('bitDepthSelect');
    const bitDepthWrapper  = document.getElementById('bitDepthWrapper');
    const bitDepthLabel    = document.getElementById('bitDepthLabel');
    const dataCalcEl       = document.getElementById('dataCalc');

    let loadedImage      = null;
    let currentQuant     = Number(quantSlider.value);
    let currentBitDepth  = 8;
    let currentColorMode = 'fullcolor';
    let sampleData       = null;

    // ── カラーモード切り替え ────────────────────────────────────
    document.querySelectorAll('.mode-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        const radio = card.querySelector('input[type="radio"]');
        radio.checked = true;
        currentColorMode = radio.value;
        updateBitDepthOptions(currentColorMode);
        if (loadedImage) sampleImage();
      });
    });

    function updateBitDepthOptions(mode) {
      bitDepthSelect.innerHTML = '';

      if (mode === 'binary') {
        bitDepthWrapper.classList.add('bit-control-disabled');
        bitDepthLabel.textContent = '量子化ビット数（2値固定）';
        const opt = document.createElement('option');
        opt.value = 1;
        opt.textContent = '1 bit（2値：0 または 1）';
        bitDepthSelect.appendChild(opt);
        currentBitDepth = 1;
        return;
      }

      bitDepthWrapper.classList.remove('bit-control-disabled');

      if (mode === 'grayscale') {
        bitDepthLabel.textContent = '量子化ビット数（グレースケール）';
        for (let i = 1; i <= 8; i++) {
          const opt = document.createElement('option');
          opt.value = i;
          const levels = Math.pow(2, i);
          opt.textContent = `${i} bit（${levels.toLocaleString()} 階調）`;
          if (i === 8) opt.selected = true;
          bitDepthSelect.appendChild(opt);
        }
      } else {
        // fullcolor
        bitDepthLabel.textContent = '量子化ビット数（チャンネルあたり）';
        for (let i = 1; i <= 8; i++) {
          const opt = document.createElement('option');
          opt.value = i;
          opt.textContent = `${i} bit/ch（計 ${i * 3} bit）`;
          if (i === 8) opt.selected = true;
          bitDepthSelect.appendChild(opt);
        }
      }

      currentBitDepth = Number(bitDepthSelect.value);
    }

    // ── 量子化処理 ─────────────────────────────────────────────
    function quantizeColor(color, bits, mode) {
      if (mode === 'binary') {
        const luma = color.r * 0.299 + color.g * 0.587 + color.b * 0.114;
        const v = luma >= 128 ? 255 : 0;
        return { r: v, g: v, b: v };
      }

      if (mode === 'grayscale') {
        const luma = Math.round(color.r * 0.299 + color.g * 0.587 + color.b * 0.114);
        if (bits >= 8) return { r: luma, g: luma, b: luma };
        const levels = 2 ** bits;
        const step = 255 / (levels - 1);
        const q = Math.min(255, Math.max(0, Math.round(luma / step) * step));
        return { r: q, g: q, b: q };
      }

      // fullcolor
      if (bits >= 8) return color;
      const levels = 2 ** bits;
      const step = 255 / (levels - 1);
      return {
        r: Math.min(255, Math.max(0, Math.round(color.r / step) * step)),
        g: Math.min(255, Math.max(0, Math.round(color.g / step) * step)),
        b: Math.min(255, Math.max(0, Math.round(color.b / step) * step)),
      };
    }

    // ── 色パレット表示 ─────────────────────────────────────────
    function updateColorPalette(uniqueColors, bitDepth, mode) {
      let maxColors;
      if (mode === 'binary') {
        maxColors = 2;
      } else if (mode === 'grayscale') {
        maxColors = Math.pow(2, bitDepth);
      } else {
        maxColors = Math.pow(2, 3 * bitDepth);
      }

      colorsUsedText.textContent = `${uniqueColors.length} / ${maxColors.toLocaleString()}`;
      colorPalette.innerHTML = '';

      if (mode === 'binary') {
        colorNote.textContent = '理論最大色数: 2色（白・黒）';
        [{ r: 255, g: 255, b: 255 }, { r: 0, g: 0, b: 0 }].forEach((color, i) => {
          const sw = document.createElement('div');
          sw.className = 'color-swatch';
          sw.style.backgroundColor = `rgb(${color.r},${color.g},${color.b})`;
          sw.style.color = i === 0 ? '#111827' : '#ffffff';
          sw.textContent = i;
          sw.title = i === 0 ? '白 (255)' : '黒 (0)';
          colorPalette.appendChild(sw);
        });
        return;
      }

      const hideSwatches = mode === 'grayscale' ? bitDepth > 6 : bitDepth > 5;

      if (hideSwatches) {
        const unit = mode === 'grayscale' ? '階調' : '色';
        colorNote.textContent = `理論最大色数: ${maxColors.toLocaleString()}${unit}。ビット数が大きいため色表示は省略します。`;
        return;
      }

      colorNote.textContent = `理論最大色数: ${maxColors.toLocaleString()}色`;
      uniqueColors.slice(0, 64).forEach((color, i) => {
        const sw = document.createElement('div');
        sw.className = 'color-swatch';
        sw.style.backgroundColor = `rgb(${color.r},${color.g},${color.b})`;
        sw.style.color = (color.r * 0.299 + color.g * 0.587 + color.b * 0.114) > 150 ? '#111827' : '#ffffff';
        sw.textContent = i;
        sw.title = `rgb(${color.r},${color.g},${color.b})`;
        colorPalette.appendChild(sw);
      });
    }

    // ── データ量計算式の表示 ───────────────────────────────────
    function renderDataCalc(cols, rows, mode, bitDepth) {
      let bitsPerPixel;
      let bppLabel;

      if (mode === 'binary') {
        bitsPerPixel = 1;
        bppLabel = '1 bit/px';
      } else if (mode === 'grayscale') {
        bitsPerPixel = bitDepth;
        bppLabel = `${bitDepth} bit/px`;
      } else {
        bitsPerPixel = bitDepth * 3;
        bppLabel = `${bitDepth} bit/ch × 3ch = ${bitsPerPixel} bit/px`;
      }

      const totalBits  = cols * rows * bitsPerPixel;
      const totalBytes = Math.round(totalBits / 8);
      const kb = totalBytes / 1024;
      const mb = kb / 1024;
      const sizeHint = mb >= 1
        ? `（≈ ${mb.toFixed(2)} MB）`
        : kb >= 1
          ? `（≈ ${kb.toFixed(1)} KB）`
          : '';

      // ビット数計算の数式行（フルカラーは展開して表示）
      let bitsLines;
      if (mode === 'fullcolor') {
        bitsLines = `${cols} × ${rows} × (${bitDepth} × 3)<br>`
                  + `= ${cols} × ${rows} × ${bitsPerPixel}<br>`
                  + `= <strong>${totalBits.toLocaleString()} bit</strong>`;
      } else {
        bitsLines = `${cols} × ${rows} × ${bitsPerPixel}<br>`
                  + `= <strong>${totalBits.toLocaleString()} bit</strong>`;
      }

      dataCalcEl.innerHTML = `
        <div class="calc-box">
          <div class="calc-section">
            <div class="calc-title">ビット数でのデータ量</div>
            <div class="calc-formula-line">横ドット数 × 縦ドット数 × ビット数/px = 総ビット数</div>
            <div class="calc-numbers">${bitsLines}</div>
            <div class="calc-note">横: ${cols} ドット　縦: ${rows} ドット　1ピクセルあたり: ${bppLabel}</div>
          </div>
          <div class="calc-section">
            <div class="calc-title">バイト（B）換算</div>
            <div class="calc-formula-line">総ビット数 ÷ 8 = データ量 [B]</div>
            <div class="calc-numbers">
              ${totalBits.toLocaleString()} ÷ 8<br>
              = <strong>${totalBytes.toLocaleString()} B</strong>${sizeHint}
            </div>
          </div>
        </div>`;
    }

    // ── メタデータ表示 ─────────────────────────────────────────
    function setMetadata(values) {
      metadataEl.innerHTML = '';
      const modeNames = { binary: '2値画像', grayscale: 'グレースケール', fullcolor: 'フルカラー' };
      const rows = [
        ['元画像サイズ',       `${values.width} × ${values.height} px`],
        ['カラーモード',       modeNames[values.colorMode]],
        ['標本化グリッド',     `${values.grid} × ${values.grid}`],
        ['総標本セル数',       values.cells],
        ['標本ブロックサイズ', `${values.blockSize} px`],
        ['平均サンプルカラー', values.averageColor],
      ];
      rows.forEach(([label, value]) => {
        const row = document.createElement('div');
        row.className = 'data-row';
        row.innerHTML = `<span>${label}</span><strong>${value}</strong>`;
        metadataEl.appendChild(row);
      });
    }

    // ── 標本グリッド描画 ───────────────────────────────────────
    function renderSpecimenGrid(blocks, gridSize) {
      specimenGrid.innerHTML = '';
      specimenGrid.style.gridTemplateColumns = `repeat(${gridSize}, minmax(0, 1fr))`;
      blocks.forEach(block => {
        const cell = document.createElement('div');
        cell.style.backgroundColor = `rgb(${block.r},${block.g},${block.b})`;
        cell.title = `(${block.r}, ${block.g}, ${block.b})`;
        specimenGrid.appendChild(cell);
      });
    }

    function buildJsonOutput(data) {
      jsonOutput.textContent = JSON.stringify(data, null, 2);
    }

    function getAverageColor(data, x, y, w, h, width) {
      let r = 0, g = 0, b = 0, count = 0;
      for (let row = y; row < y + h; row++) {
        for (let col = x; col < x + w; col++) {
          const idx = (row * width + col) * 4;
          r += data[idx]; g += data[idx + 1]; b += data[idx + 2];
          count++;
        }
      }
      return { r: Math.round(r / count), g: Math.round(g / count), b: Math.round(b / count) };
    }

    // ── メイン標本化処理 ───────────────────────────────────────
    function sampleImage() {
      if (!loadedImage) return;

      const grid   = currentQuant;
      const width  = sourceCanvas.width;
      const height = sourceCanvas.height;
      const ctx    = sourceCanvas.getContext('2d');
      const data   = ctx.getImageData(0, 0, width, height).data;
      const blockW = Math.max(1, Math.floor(width / grid));
      const blockH = Math.max(1, Math.floor(height / grid));
      const blocks = [];

      for (let row = 0; row < grid; row++) {
        for (let col = 0; col < grid; col++) {
          const x = col * blockW;
          const y = row * blockH;
          const w = col === grid - 1 ? width  - x : blockW;
          const h = row === grid - 1 ? height - y : blockH;
          const avgColor = getAverageColor(data, x, y, w, h, width);
          blocks.push(quantizeColor(avgColor, currentBitDepth, currentColorMode));
        }
      }

      renderSpecimenGrid(blocks, grid);

      const uniqueMap = new Map();
      blocks.forEach(b => {
        const key = `${b.r},${b.g},${b.b}`;
        if (!uniqueMap.has(key)) uniqueMap.set(key, b);
      });
      const uniqueColors = Array.from(uniqueMap.values());
      updateColorPalette(uniqueColors, currentBitDepth, currentColorMode);

      const avg = blocks.reduce((acc, c) => {
        acc.r += c.r; acc.g += c.g; acc.b += c.b; return acc;
      }, { r: 0, g: 0, b: 0 });
      avg.r = Math.round(avg.r / blocks.length);
      avg.g = Math.round(avg.g / blocks.length);
      avg.b = Math.round(avg.b / blocks.length);

      const values = {
        width, height, grid,
        colorMode:    currentColorMode,
        bitDepth:     currentBitDepth,
        colorsUsed:   uniqueColors.length,
        cells:        blocks.length,
        blockSize:    `${blockW} × ${blockH}`,
        averageColor: `rgb(${avg.r},${avg.g},${avg.b})`,
        specimen:     blocks,
      };

      sampleData = values;
      setMetadata(values);
      renderDataCalc(grid, grid, currentColorMode, currentBitDepth);
      buildJsonOutput(values);
    }

    function drawImageToCanvas(image) {
      const maxSize = 480;
      const size = Math.min(image.width, image.height, maxSize);
      const x = (image.width  - size) / 2;
      const y = (image.height - size) / 2;
      sourceCanvas.width  = size;
      sourceCanvas.height = size;
      sourceCanvas.getContext('2d').drawImage(image, x, y, size, size, 0, 0, size, size);
    }

    function showOriginalPreview(image) {
      originalPreview.innerHTML = '';
      const img = document.createElement('img');
      img.src = image.src;
      img.alt = 'Uploaded photo preview';
      originalPreview.appendChild(img);
    }

    function resetApp() {
      loadedImage = null;
      sampleData  = null;
      originalPreview.innerHTML = '<p class="note">ここにアップロードした写真が表示されます。</p>';
      specimenGrid.innerHTML    = '<p class="note">ここに標本化された結果が表示されます。</p>';
      metadataEl.innerHTML      = '';
      dataCalcEl.innerHTML      = '<p class="calc-placeholder">画像をアップロードすると計算式が表示されます。</p>';
      jsonOutput.textContent    = '{}';
      jsonOutput.style.display  = 'none';
      toggleJsonButton.textContent = 'JSON出力表示';
      sourceCanvas.width  = 0;
      sourceCanvas.height = 0;
    }

    function handleUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const image = new Image();
        image.onload = () => {
          loadedImage = image;
          drawImageToCanvas(image);
          showOriginalPreview(image);
          sampleImage();
        };
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    // ── イベントリスナー ───────────────────────────────────────
    uploadInput.addEventListener('change', handleUpload);

    quantSlider.addEventListener('input', () => {
      currentQuant = Number(quantSlider.value);
      quantOutput.textContent = currentQuant;
      if (loadedImage) sampleImage();
    });

    document.getElementById('clearButton').addEventListener('click', () => {
      uploadInput.value = '';
      resetApp();
    });

    bitDepthSelect.addEventListener('change', () => {
      currentBitDepth = Number(bitDepthSelect.value);
      if (loadedImage) sampleImage();
    });

    toggleJsonButton.addEventListener('click', () => {
      if (jsonOutput.style.display === 'none') {
        if (sampleData) buildJsonOutput(sampleData);
        jsonOutput.style.display = 'block';
        toggleJsonButton.textContent = 'JSON出力非表示';
      } else {
        jsonOutput.style.display = 'none';
        toggleJsonButton.textContent = 'JSON出力表示';
      }
    });

    // 初期化
    updateBitDepthOptions('fullcolor');
    resetApp();
  </script>
</body>
</html>
