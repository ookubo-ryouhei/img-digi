<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像のデジタル標本化ツール</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f5f7ff 0%, #eef2ff 100%);
      color: #1f2937;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .header p {
      margin: 0.75rem auto 0;
      max-width: 780px;
      color: #4b5563;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .controls,
    .results,
    .preview {
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.06);
    }

    .controls {
      display: grid;
      gap: 16px;
    }

    .controls label,
    .results label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .controls input[type="file"],
    .controls input[type="range"],
    .controls button,
    .controls select {
      width: 100%;
      font: inherit;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .range-row output {
      font-weight: 700;
      min-width: 2.75rem;
      text-align: right;
    }

    button {
      border: none;
      background: #4338ca;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease;
    }

    button:hover {
      background: #3730a3;
      transform: translateY(-1px);
    }

    .preview {
      display: grid;
      gap: 16px;
    }

    .image-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .image-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      overflow: hidden;
      background: #fafbff;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-card img,
    .image-card canvas {
      width: 100%;
      height: auto;
      max-height: 360px;
      object-fit: contain;
    }
    .color-panel {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .bit-control {
      display: grid;
      gap: 10px;
    }

    .color-stats .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .color-palette {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      max-width: 100%;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111827;
      font-size: 0.72rem;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    }
    .specimen-grid {
      display: grid;
      gap: 2px;
      border-radius: 12px;
      overflow: hidden;
      background: #e5e7eb;
      min-height: 220px;
      width: 100%;
      aspect-ratio: 1;
    }

    .specimen-grid div {
      aspect-ratio: 1;
    }

    .metadata {
      display: grid;
      gap: 12px;
    }

    .metadata .data-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .metadata .data-row:last-child {
      border-bottom: none;
    }

    .metadata strong {
      color: #111827;
    }

    .results pre {
      margin: 0;
      padding: 14px;
      background: #f8fafc;
      border-radius: 14px;
      overflow-x: auto;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .note {
      color: #4b5563;
      font-size: 0.95rem;
    }

    @media (max-width: 900px) {
      .image-row {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1>画像のデジタル標本化ツール</h1>
      <p>撮影した写真をアップロードすると、自動で量子化した標本が表示されます。標本化の粒度は後からスライダーで調整できます。</p>
    </header>

    <div class="grid">
      <section class="controls">
        <label for="imageUpload">写真をアップロード</label>
        <input type="file" id="imageUpload" accept="image/*" />

        <div class="range-row">
          <label for="quantizationSlider">標本化量子化数</label>
          <output id="quantizationValue">16</output>
        </div>
        <input type="range" id="quantizationSlider" min="4" max="48" value="16" step="1" />

        <button id="clearButton" type="button">リセット</button>
      </section>

      <section class="preview">
        <div class="image-row">
          <div class="image-card" id="originalPreview">
            <p class="note">ここにアップロードした写真が表示されます。</p>
          </div>
          <div class="image-card color-panel">
            <div class="bit-control">
              <label for="bitDepthSelect">量子化ビット数</label>
              <select id="bitDepthSelect">
                <option value="1">1 bit</option>
                <option value="2">2 bit</option>
                <option value="3">3 bit</option>
                <option value="4">4 bit</option>
                <option value="5">5 bit</option>
                <option value="6" selected>6 bit</option>
                <option value="7">7 bit</option>
                <option value="8">8 bit</option>
              </select>
            </div>
            <div class="color-stats">
              <p class="note">標本化後の色数と、5bit以下の色パレットを表示します。</p>
              <div class="stat-row"><strong>色数:</strong> <span id="colorsUsedText">0</span></div>
              <div id="colorPalette" class="color-palette"></div>
              <p class="note" id="colorNote"></p>
            </div>
          </div>
        </div>

        <div class="specimen-grid" id="specimenGrid">
          <p class="note">ここに標本化された結果が表示されます。</p>
        </div>
      </section>

      <section class="results">
        <h2>標本データ</h2>
        <div class="metadata" id="metadata"></div>
        <h3>JSON出力</h3>
        <button id="toggleJsonButton" type="button">JSON出力表示</button>
        <pre id="jsonOutput" style="display: none;">{}</pre>
      </section>
    </div>

    <canvas id="sourceCanvas" hidden></canvas>
  </main>

  <script>
    const uploadInput = document.getElementById('imageUpload');
    const quantSlider = document.getElementById('quantizationSlider');
    const quantOutput = document.getElementById('quantizationValue');
    const specimenGrid = document.getElementById('specimenGrid');
    const originalPreview = document.getElementById('originalPreview');
    const specimenCanvas = document.getElementById('specimenCanvas');
    const sourceCanvas = document.getElementById('sourceCanvas');
    const metadataEl = document.getElementById('metadata');
    const colorsUsedText = document.getElementById('colorsUsedText');
    const colorPalette = document.getElementById('colorPalette');
    const colorNote = document.getElementById('colorNote');
    const jsonOutput = document.getElementById('jsonOutput');
    const toggleJsonButton = document.getElementById('toggleJsonButton');
    const bitDepthSelect = document.getElementById('bitDepthSelect');

    let loadedImage = null;
    let currentQuant = Number(quantSlider.value);
    let currentBitDepth = Number(bitDepthSelect.value);
    let sampleData = null;

    function setMetadata(values) {
      metadataEl.innerHTML = '';
      const rows = [
        ['Original image size', `${values.width} × ${values.height} px`],
        ['Quantization grid', `${values.grid} × ${values.grid}`],
        ['Total specimen cells', values.cells],
        ['Sample block size', `${values.blockSize}px`],
        ['Average sample color', values.averageColor],
      ];

      rows.forEach(([label, value]) => {
        const row = document.createElement('div');
        row.className = 'data-row';
        row.innerHTML = `<span>${label}</span><strong>${value}</strong>`;
        metadataEl.appendChild(row);
      });
    }

    function renderSpecimenGrid(blocks, gridSize) {
      specimenGrid.innerHTML = '';
      specimenGrid.style.gridTemplateColumns = `repeat(${gridSize}, minmax(0, 1fr))`;
      blocks.forEach((block) => {
        const cell = document.createElement('div');
        cell.style.backgroundColor = `rgb(${block.r}, ${block.g}, ${block.b})`;
        cell.title = `(${block.r}, ${block.g}, ${block.b})`;
        specimenGrid.appendChild(cell);
      });
    }

    function quantizeColor(color, bits) {
      if (bits >= 8) {
        return color;
      }
      const levels = 2 ** bits;
      const step = 255 / (levels - 1);
      return {
        r: Math.min(255, Math.max(0, Math.round(color.r / step) * step)),
        g: Math.min(255, Math.max(0, Math.round(color.g / step) * step)),
        b: Math.min(255, Math.max(0, Math.round(color.b / step) * step)),
      };
    }

    function updateColorPalette(uniqueColors, bitDepth) {
      const maxColors = Math.pow(2, 3 * bitDepth);
      colorsUsedText.textContent = `${uniqueColors.length} / ${maxColors}`;
      colorPalette.innerHTML = '';
      if (bitDepth > 5) {
        colorNote.textContent = `理論最大色数: ${maxColors}色。5bit以上のため、色表示は省略します。`;
        return;
      }
      colorNote.textContent = `理論最大色数: ${maxColors}色`;
      uniqueColors.slice(0, 64).forEach((color, index) => {
        const swatch = document.createElement('div');
        swatch.className = 'color-swatch';
        swatch.style.backgroundColor = `rgb(${color.r}, ${color.g}, ${color.b})`;
        swatch.style.color = (color.r * 0.299 + color.g * 0.587 + color.b * 0.114) > 150 ? '#111827' : '#ffffff';
        swatch.textContent = index;
        swatch.title = `rgb(${color.r}, ${color.g}, ${color.b})`;
        colorPalette.appendChild(swatch);
      });
    }

    function buildJsonOutput(data) {
      jsonOutput.textContent = JSON.stringify(data, null, 2);
    }

    function getAverageColor(data, x, y, w, h, width) {
      let r = 0;
      let g = 0;
      let b = 0;
      let count = 0;

      for (let row = y; row < y + h; row++) {
        for (let col = x; col < x + w; col++) {
          const index = (row * width + col) * 4;
          r += data[index];
          g += data[index + 1];
          b += data[index + 2];
          count += 1;
        }
      }

      return {
        r: Math.round(r / count),
        g: Math.round(g / count),
        b: Math.round(b / count),
      };
    }

    function sampleImage() {
      if (!loadedImage) {
        return;
      }

      const grid = currentQuant;
      const width = sourceCanvas.width;
      const height = sourceCanvas.height;
      const ctx = sourceCanvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      const blockW = Math.max(1, Math.floor(width / grid));
      const blockH = Math.max(1, Math.floor(height / grid));
      const blocks = [];

      for (let row = 0; row < grid; row++) {
        for (let col = 0; col < grid; col++) {
          const x = col * blockW;
          const y = row * blockH;
          const w = col === grid - 1 ? width - x : blockW;
          const h = row === grid - 1 ? height - y : blockH;
          const avgColor = getAverageColor(data, x, y, w, h, width);
        const quantColor = quantizeColor(avgColor, currentBitDepth);
        blocks.push(quantColor);
      }
    }

      renderSpecimenGrid(blocks, grid);

      const uniqueMap = new Map();
      blocks.forEach((block) => {
        const key = `${block.r},${block.g},${block.b}`;
        if (!uniqueMap.has(key)) {
          uniqueMap.set(key, block);
        }
      });
      const uniqueColors = Array.from(uniqueMap.values());
      updateColorPalette(uniqueColors, currentBitDepth);

      const averageColor = blocks.reduce(
        (acc, c) => {
          acc.r += c.r;
          acc.g += c.g;
          acc.b += c.b;
          return acc;
        },
        { r: 0, g: 0, b: 0 }
      );
      averageColor.r = Math.round(averageColor.r / blocks.length);
      averageColor.g = Math.round(averageColor.g / blocks.length);
      averageColor.b = Math.round(averageColor.b / blocks.length);

      const values = {
        width,
        height,
        grid,
        bitDepth: currentBitDepth,
        colorsUsed: uniqueColors.length,
        cells: blocks.length,
        blockSize: `${blockW} × ${blockH}`,
        averageColor: `rgb(${averageColor.r}, ${averageColor.g}, ${averageColor.b})`,
        specimen: blocks,
      };

      sampleData = values;
      buildJsonOutput(values);
    }

    function drawImageToCanvas(image) {
      const maxCanvasSize = 480;
      const size = Math.min(image.width, image.height, maxCanvasSize);
      const x = (image.width - size) / 2;
      const y = (image.height - size) / 2;

      sourceCanvas.width = size;
      sourceCanvas.height = size;
      sourceCanvas.getContext('2d').drawImage(image, x, y, size, size, 0, 0, size, size);
    }

    function showOriginalPreview(image) {
      originalPreview.innerHTML = '';
      const img = document.createElement('img');
      img.src = image.src;
      img.alt = 'Uploaded photo preview';
      originalPreview.appendChild(img);
    }

    function resetApp() {
      loadedImage = null;
      sampleData = null;
      originalPreview.innerHTML = '<p class="note">ここにアップロードした写真が表示されます。</p>';
      specimenGrid.innerHTML = '<p class="note">ここに標本化された結果が表示されます。</p>';
      metadataEl.innerHTML = '';
      jsonOutput.textContent = '{}';
      if (jsonOutput) {
        jsonOutput.style.display = 'none';
      }
      if (toggleJsonButton) {
        toggleJsonButton.textContent = 'JSON出力表示';
      }
      if (specimenCanvas) {
        specimenCanvas.width = 0;
        specimenCanvas.height = 0;
      }
      sourceCanvas.width = 0;
      sourceCanvas.height = 0;
    }

    function handleUpload(event) {
      const file = event.target.files[0];
      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        const image = new Image();
        image.onload = () => {
          loadedImage = image;
          drawImageToCanvas(image);
          showOriginalPreview(image);
          sampleImage();
        };
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    uploadInput.addEventListener('change', handleUpload);
    quantSlider.addEventListener('input', () => {
      currentQuant = Number(quantSlider.value);
      quantOutput.textContent = currentQuant;
      if (loadedImage) {
        sampleImage();
      }
    });

    document.getElementById('clearButton').addEventListener('click', () => {
      uploadInput.value = '';
      resetApp();
    });

    bitDepthSelect.addEventListener('change', () => {
      currentBitDepth = Number(bitDepthSelect.value);
      if (loadedImage) {
        sampleImage();
      }
    });

    toggleJsonButton.addEventListener('click', () => {
      if (jsonOutput.style.display === 'none') {
        if (sampleData) {
          buildJsonOutput(sampleData);
        }
        jsonOutput.style.display = 'block';
        toggleJsonButton.textContent = 'JSON出力非表示';
      } else {
        jsonOutput.style.display = 'none';
        toggleJsonButton.textContent = 'JSON出力表示';
      }
    });

    
    resetApp();
  </script>
</body>
</html>
